name: Main

on:
  push:
    branches:
      - master
  pull_request:

env:
  GO_VERSION: "1.23"
  GOLANGCI_LINT_VERSION: v2.12.2
  YAEGI_VERSION: v0.16.1
  CGO_ENABLED: 0

jobs:
  main:
    name: Main Process
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check module tidiness and vendoring
        run: |
          go mod tidy
          go mod vendor
          git diff --exit-code go.mod go.sum vendor

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

      - name: Test
        run: go test -v -cover ./...

      - name: Install Yaegi ${{ env.YAEGI_VERSION }}
        run: curl -sfL https://raw.githubusercontent.com/traefik/yaegi/master/install.sh | bash -s -- -b $(go env GOPATH)/bin ${YAEGI_VERSION}

      # Yaegi loads the plugin the same way Traefik does at runtime, but its
      # import resolver is GOPATH-based, so the plugin and its vendored deps
      # must live under GOPATH/src.
      - name: Run tests with Yaegi
        run: |
          PKG=github.com/${{ github.repository }}
          GP="$(go env GOPATH)"
          mkdir -p "$GP/src/${PKG%/*}"
          cp -r vendor/* "$GP/src/"
          cp -r . "$GP/src/$PKG"
          cd "$GP/src/$PKG"
          yaegi test -v .
