version: "2"

run:
  timeout: 3m

linters:
  default: all
  disable:
    - bodyclose # Too many false positives: https://github.com/timakin/bodyclose/issues/30
    - canonicalheader # plugin deliberately handles arbitrary user-supplied header casing
    - cyclop # duplicate of gocyclo
    - depguard # no dependency allow/deny policy needed for this plugin
    - dupl
    - err113
    - exhaustive
    - exhaustruct
    - forbidigo
    - gomodguard # no module allow/deny policy needed for this plugin
    - gomodguard_v2
    - lll
    - mnd
    - nlreturn
    - noctx
    - noinlineerr # inline `if err := ...; err != nil` is idiomatic here
    - paralleltest
    - rowserrcheck # not relevant (SQL)
    - sqlclosecheck # not relevant (SQL)
    - tagliatelle # json tag `header_name` is the intended Traefik config key
    - testpackage
    - tparallel
    - varnamelen
    - wrapcheck
    - wsl # deprecated alias, replaced by wsl_v5
    - wsl_v5
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    gocyclo:
      min-complexity: 12
    goconst:
      min-len: 5
      min-occurrences: 4
    misspell:
      locale: US
    funlen:
      lines: -1
      statements: 50
    godox:
      keywords:
        - FIXME
  exclusions:
    rules:
      - path: (.+)_test.go
        linters:
          - funlen
          - goconst
          - godot

formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
